openapi: "3.0.3"

info:
  title: "KE-WP / KE-GO Mapping API"
  version: "1"
  description: |
    Read-only, public REST API for curated Key Event (KE) to WikiPathways and
    Gene Ontology (GO) mappings.

    **Rate limit:** 100 requests per hour per IP address.
    When the limit is exceeded the API returns HTTP 429 with a `Retry-After`
    header (integer seconds until the limit resets).

    No authentication is required. All endpoints return JSON by default;
    collection endpoints also support CSV output via `?format=csv` or the
    `Accept: text/csv` request header.

servers:
  - url: /api/v1
    description: "Current stable API (v1)"

paths:

  /mappings:
    get:
      operationId: listMappings
      summary: List KE-to-WikiPathways mappings
      description: |
        Returns a paginated list of curated KE-to-WikiPathways (WP) mappings.
        All query parameters are optional and combinable.
        Set `?format=csv` to download a CSV file instead of JSON.
      tags:
        - KE-WP Mappings
      parameters:
        - name: ke_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by Key Event ID (e.g. 'KE 55')"
        - name: pathway_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by WikiPathways ID (e.g. 'WP1234')"
        - name: confidence_level
          in: query
          required: false
          schema:
            type: string
            enum: [High, Medium, Low]
          description: "Filter by confidence level"
        - name: aop_id
          in: query
          required: false
          schema:
            type: string
          description: "Resolve AOP to its KEs and filter; accepts numeric ID or 'AOP N' format"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Page number (1-based)"
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: "Results per page (max 200)"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv]
          description: "Set to 'csv' to receive a CSV download instead of JSON"
      responses:
        "200":
          description: "Paginated list of KE-WP mappings"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MappingsResponse"
            text/csv:
              schema:
                type: string
                description: "CSV with flattened provenance columns"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /mappings/{uuid}:
    get:
      operationId: getMapping
      summary: Get a single KE-WP mapping by UUID
      description: "Returns a single curated KE-to-WikiPathways mapping identified by its stable UUID."
      tags:
        - KE-WP Mappings
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "Stable UUID of the mapping"
      responses:
        "200":
          description: "Single KE-WP mapping"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Mapping"
        "404":
          description: "Mapping not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /go-mappings:
    get:
      operationId: listGoMappings
      summary: List KE-to-GO-term mappings
      description: |
        Returns a paginated list of curated KE-to-Gene Ontology (GO) term mappings.
        All query parameters are optional and combinable.
        Set `?format=csv` to download a CSV file instead of JSON.
      tags:
        - KE-GO Mappings
      parameters:
        - name: ke_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by Key Event ID (e.g. 'KE 55')"
        - name: go_term_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by GO term ID (e.g. 'GO:0006915')"
        - name: confidence_level
          in: query
          required: false
          schema:
            type: string
            enum: [High, Medium, Low]
          description: "Filter by confidence level"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Page number (1-based)"
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: "Results per page (max 200)"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv]
          description: "Set to 'csv' to receive a CSV download instead of JSON"
      responses:
        "200":
          description: "Paginated list of KE-GO mappings"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoMappingsResponse"
            text/csv:
              schema:
                type: string
                description: "CSV with flattened provenance columns"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /go-mappings/{uuid}:
    get:
      operationId: getGoMapping
      summary: Get a single KE-GO mapping by UUID
      description: "Returns a single curated KE-to-GO mapping identified by its stable UUID."
      tags:
        - KE-GO Mappings
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "Stable UUID of the GO mapping"
      responses:
        "200":
          description: "Single KE-GO mapping"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GoMapping"
        "404":
          description: "GO mapping not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /reactome-mappings:
    get:
      operationId: listReactomeMappings
      summary: List KE-to-Reactome pathway mappings
      description: |
        Returns a paginated list of curated KE-to-Reactome pathway mappings.
        All query parameters are optional and combinable.
        Set `?format=csv` to download a CSV file instead of JSON.
      tags:
        - KE-Reactome Mappings
      parameters:
        - name: ke_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by Key Event ID (e.g. 'KE 55')"
        - name: reactome_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by Reactome pathway ID (e.g. 'R-HSA-1234')"
        - name: confidence_level
          in: query
          required: false
          schema:
            type: string
            enum: [High, Medium, Low]
          description: "Filter by confidence level"
        - name: aop_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter to KEs belonging to this AOP (numeric or 'AOP N')"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Page number (1-based)"
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: "Results per page (max 200)"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv]
          description: "Set to 'csv' to receive a CSV download instead of JSON"
      responses:
        "200":
          description: "Paginated list of KE-Reactome mappings"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactomeMappingsResponse"
            text/csv:
              schema:
                type: string
                description: "CSV with flattened provenance columns"
        "400":
          description: "Invalid AOP ID or SPARQL unavailable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /reactome-mappings/{uuid}:
    get:
      operationId: getReactomeMapping
      summary: Get a single KE-Reactome mapping by UUID
      description: "Returns a single curated KE-to-Reactome mapping identified by its stable UUID."
      tags:
        - KE-Reactome Mappings
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "Stable UUID of the Reactome mapping"
      responses:
        "200":
          description: "Single KE-Reactome mapping"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ReactomeMapping"
        "404":
          description: "Reactome mapping not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /aops:
    get:
      operationId: listAops
      summary: List Adverse Outcome Pathways with mapping coverage
      description: |
        Returns the AOPs this instance knows about, each with its Key Event
        count and how many of those KEs carry approved mappings, broken down
        per resource (WikiPathways / GO / Reactome). Sorted by
        `mapped_ke_count` descending, so the best-covered AOPs come first.

        AOP membership comes from a precomputed AOP-Wiki snapshot — the same
        source behind the `ke_aop_context` field on mapping records — so it is
        as current as the last snapshot refresh, not live SPARQL.

        Set `?format=csv` to download a CSV file instead of JSON.
      tags:
        - AOPs
      parameters:
        - name: mapped_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: "Return only AOPs with at least one mapped Key Event"
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: "Case-insensitive substring filter over aop_id and aop_title"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Page number (1-based)"
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: "Results per page (max 200)"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv]
          description: "Set to 'csv' to receive a CSV download instead of JSON"
      responses:
        "200":
          description: "Paginated list of AOPs"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AopsResponse"
            text/csv:
              schema:
                type: string
                description: "CSV with one row per AOP"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:

  schemas:

    Mapping:
      type: object
      description: "A curated mapping between a Key Event and a WikiPathways pathway"
      properties:
        uuid:
          type: string
          format: uuid
          description: "Stable unique identifier"
        ke_id:
          type: string
          description: "Key Event identifier (e.g. 'KE 55')"
        ke_name:
          type: string
          description: "Key Event title"
        pathway_id:
          type: string
          description: "WikiPathways identifier (e.g. 'WP1234')"
        pathway_title:
          type: string
          description: "WikiPathways pathway title"
        confidence_level:
          type: string
          enum: [High, Medium, Low]
          description: "Curator-assessed confidence level"
        connection_type:
          type: string
          nullable: true
          description: "Relationship type between KE and pathway (e.g. 'direct', 'indirect')"
        ke_aop_context:
          type: array
          items:
            type: string
          description: "AOP IDs containing this Key Event (e.g. ['AOP 1', 'AOP 23']). Empty array when no membership data available."
        ke_bio_level:
          type: string
          nullable: true
          description: "Biological organization level of the Key Event (e.g. 'Molecular', 'Cellular', 'Tissue')"
        provenance:
          $ref: "#/components/schemas/Provenance"

    GoMapping:
      type: object
      description: "A curated mapping between a Key Event and a Gene Ontology term"
      properties:
        uuid:
          type: string
          format: uuid
          description: "Stable unique identifier"
        ke_id:
          type: string
          description: "Key Event identifier (e.g. 'KE 55')"
        ke_name:
          type: string
          description: "Key Event title"
        go_term_id:
          type: string
          description: "GO term identifier (e.g. 'GO:0006915')"
        go_term_name:
          type: string
          description: "GO term label"
        go_namespace:
          type: string
          description: "GO namespace (biological_process, molecular_function, cellular_component)"
        confidence_level:
          type: string
          enum: [High, Medium, Low]
          description: "Curator-assessed confidence level"
        connection_type:
          type: string
          nullable: true
          description: "Relationship type between KE and pathway (e.g. 'direct', 'indirect')"
        ke_aop_context:
          type: array
          items:
            type: string
          description: "AOP IDs containing this Key Event (e.g. ['AOP 1', 'AOP 23']). Empty array when no membership data available."
        ke_bio_level:
          type: string
          nullable: true
          description: "Biological organization level of the Key Event (e.g. 'Molecular', 'Cellular', 'Tissue')"
        go_definition:
          type: string
          nullable: true
          description: "Gene Ontology term definition text"
        go_ic:
          type: number
          format: float
          nullable: true
          description: "Information Content score (0.0 = most general, higher = more specific). Null when GO hierarchy data unavailable."
        go_depth:
          type: integer
          nullable: true
          description: "Depth of GO term in the ontology hierarchy (0 = root). Null when GO hierarchy data unavailable."
        provenance:
          $ref: "#/components/schemas/Provenance"

    Provenance:
      type: object
      description: "Curation provenance information"
      properties:
        suggestion_score:
          type: number
          format: float
          nullable: true
          description: "BioBERT cosine-similarity score from automated suggestion (null for pre-Phase-3 rows)"
        approved_by:
          type: string
          nullable: true
          description: "Provider-prefixed username of the curator who approved the mapping (e.g. 'github:mmartens', 'orcid:0000-0001-...')"
        proposed_by:
          type: string
          nullable: true
          description: "Provider-prefixed username of the curator who proposed the mapping (e.g. 'github:mmartens', 'orcid:0000-0001-...'). Null for pre-v1.2 mappings."
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: "ISO 8601 timestamp of curator approval"

    Pagination:
      type: object
      description: "Pagination envelope"
      properties:
        page:
          type: integer
          description: "Current page number"
        per_page:
          type: integer
          description: "Results per page"
        total:
          type: integer
          description: "Total number of matching results"
        total_pages:
          type: integer
          description: "Total number of pages"
        next:
          type: string
          format: uri
          nullable: true
          description: "URL of the next page (null if on last page)"
        prev:
          type: string
          format: uri
          nullable: true
          description: "URL of the previous page (null if on first page)"

    MappingsResponse:
      type: object
      description: "Paginated list of KE-WP mappings"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Mapping"
        pagination:
          $ref: "#/components/schemas/Pagination"

    GoMappingsResponse:
      type: object
      description: "Paginated list of KE-GO mappings"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GoMapping"
        pagination:
          $ref: "#/components/schemas/Pagination"

    ReactomeMapping:
      type: object
      description: "A curated mapping between a Key Event and a Reactome pathway"
      properties:
        uuid:
          type: string
          format: uuid
          description: "Stable unique identifier"
        ke_id:
          type: string
          description: "Key Event identifier (e.g. 'KE 55')"
        ke_name:
          type: string
          description: "Key Event title"
        reactome_id:
          type: string
          pattern: "^R-HSA-[0-9]+$"
          description: "Reactome pathway identifier (e.g. 'R-HSA-1234')"
        pathway_name:
          type: string
          description: "Reactome pathway display name"
        species:
          type: string
          nullable: true
          description: "Species label associated with the pathway (typically 'Homo sapiens')"
        confidence_level:
          type: string
          enum: [High, Medium, Low]
          description: "Curator-assessed confidence level"
        pathway_description:
          type: string
          nullable: true
          description: "Reactome pathway description text (from precomputed metadata; null when unavailable)"
        reactome_gene_count:
          type: integer
          description: "Number of HGNC gene symbols associated with the Reactome pathway in the precomputed gene set"
        ke_aop_context:
          type: array
          items:
            type: string
          description: "AOP IDs containing this Key Event (e.g. ['AOP 1', 'AOP 23']). Empty array when no membership data available."
        ke_bio_level:
          type: string
          nullable: true
          description: "Biological organization level of the Key Event (e.g. 'Molecular', 'Cellular', 'Tissue')"
        provenance:
          $ref: "#/components/schemas/Provenance"
      required:
        - uuid
        - ke_id
        - reactome_id
        - pathway_name
        - confidence_level

    ReactomeMappingsResponse:
      type: object
      description: "Paginated list of KE-Reactome mappings"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReactomeMapping"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    Aop:
      type: object
      description: "An Adverse Outcome Pathway with its curated mapping coverage"
      properties:
        aop_id:
          type: string
          description: "AOP-Wiki identifier"
          example: "AOP 625"
        aop_title:
          type: string
          description: "AOP title from AOP-Wiki"
        ke_count:
          type: integer
          description: "Total Key Events in this AOP"
        mapped_ke_count:
          type: integer
          description: "Key Events with at least one approved mapping on any resource"
        wikipathways_ke_count:
          type: integer
          description: "Key Events with an approved KE-WP mapping"
        go_ke_count:
          type: integer
          description: "Key Events with an approved KE-GO mapping"
        reactome_ke_count:
          type: integer
          description: "Key Events with an approved KE-Reactome mapping"

    AopsResponse:
      type: object
      description: "Paginated list of AOPs"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Aop"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    ErrorResponse:
      type: object
      description: "Error response body"
      properties:
        error:
          type: string
          description: "Human-readable error message"

  responses:

    TooManyRequests:
      description: "Rate limit exceeded — 100 requests per hour per IP"
      headers:
        Retry-After:
          description: "Number of seconds until the rate limit window resets"
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Rate limit exceeded. Please retry after the indicated number of seconds."
